# CapyTown G4 - Rangos HSV (alineados con el repo de referencia que ya corre
# correctamente en pista). RECALIBRAR el dia del lab con
# scripts/hsv_calibrate.py o `python3 lane_node.py --calibrar` bajo la
# iluminacion real, y reemplazar abajo los valores obtenidos.
lane_detector:
  ros__parameters:

    # Blanco - HSV (baja saturacion, alto brillo)
    white_h_min: 0
    white_h_max: 180
    white_s_min: 0
    white_s_max: 65
    white_v_min: 170
    white_v_max: 255
    white_min_elong: 5.0
    white_min_area: 1000
    white_max_area: 8000

    # Amarillo - HSV
    yellow_h_min: 15
    yellow_h_max: 45
    yellow_s_min: 45
    yellow_s_max: 255
    yellow_v_min: 80
    yellow_v_max: 255
    yellow_min_elong: 8.0
    yellow_min_area: 500
    yellow_max_area: 20000

    # Geometria / IPM
    lane_width_m: 0.22
    px_per_meter: 600.0
    publish_debug: true
    white_bias_m: 0.02   # m — desplaza el centro objetivo 2cm hacia el amarillo
