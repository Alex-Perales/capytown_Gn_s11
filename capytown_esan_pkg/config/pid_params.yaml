# CapyTown G4 - Ganancias PID (alineadas con el repo de referencia que ya
# corre correctamente en pista). Sintonizar UN parametro a la vez.
lane_controller:
  ros__parameters:

    kp: 2.2
    ki: 0.12
    kd: 0.25
    kff: 0.6

    linear_speed: 0.34    # m/s — requisito de competencia >= 0.2 m/s, con margen

    max_angular: 2.0
    integral_limit: 0.5
    error_timeout: 0.5    # s sin amarillo NI blanco -> frena por completo
    control_rate: 30.0

    start_delay: 5.0      # s — al detectar color, espera quieto antes de avanzar
    imu_topic: /imu
    odom_topic: /odom_raw

    calib_tolerance: 0.025        # m — error/pendiente max para considerar "centrado"
    curve_speed_factor: 0.6       # reduce velocidad lineal 40% SIEMPRE
    slope_curve_threshold: 0.04   # m — pendiente minima para anticipar cur